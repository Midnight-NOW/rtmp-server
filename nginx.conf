user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10000;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main buffer=32k;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    
    # Performance tuning
    keepalive_requests 100;
    server_tokens off;
    
    # Gzip compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/vnd.apple.mpegurl application/dash+xml;

    # HTTP Server for HLS/DASH and Statistics
    server {
        listen 80 default_server;
        server_name _;
        client_max_body_size 0;

        # HLS Endpoint
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias /var/streaming/hls;
            add_header Cache-Control "max-age=3";
            add_header Access-Control-Allow-Origin "*";
            expires 3s;
        }

        # DASH Endpoint
        location /dash {
            types {
                application/dash+xml mpd;
                video/mp4 mp4;
            }
            alias /var/streaming/dash;
            add_header Cache-Control "max-age=3";
            add_header Access-Control-Allow-Origin "*";
            expires 3s;
        }

        # VOD (Video on Demand)
        location /vod {
            alias /var/streaming/vod;
            add_header Access-Control-Allow-Origin "*";
        }

        # Statistics
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet /stat.xsl;
            add_header Access-Control-Allow-Origin "*";
        }

        # Statistics Stylesheet
        location /stat.xsl {
            alias /var/streaming/stat.xsl;
        }

        # Stream Control
        location /control {
            rtmp_control all;
            add_header Access-Control-Allow-Origin "*";
        }

        # Recordings
        location /recordings {
            alias /var/streaming/recordings;
            autoindex on;
            add_header Access-Control-Allow-Origin "*";
        }

        # Web Dashboard
        location / {
            root /var/streaming/www;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_connections 1000;
        
        # Timeout settings
        timeout 20s;
        
        # Main live application
        application live {
            live on;
            
            # HLS Settings
            hls on;
            hls_path /var/streaming/hls;
            hls_fragment 2s;
            hls_playlist_length 3;
            hls_sync 100ms;
            hls_continuous on;
            hls_cleanup on;
            
            # DASH Settings
            dash on;
            dash_path /var/streaming/dash;
            dash_fragment 2s;
            dash_playlist_length 3;
            
            # Recording (optional)
            record off;
            record_path /var/streaming/recordings;
            record_suffix -%d-%b-%y-%T.flv;
            record_unique on;
            
            # Access Control
            allow publish all;
            allow play all;
            
            # Notify on events
            on_publish http://localhost:8080/api/publish;
            on_unpublish http://localhost:8080/api/unpublish;
            on_play http://localhost:8080/api/play;
            on_play_done http://localhost:8080/api/play_done;
            
            # Drop connections after 5 minutes of inactivity
            drop_idle_publisher 300s;
        }
        
        # VOD (Video on Demand) Application
        application vod {
            play /var/streaming/vod;
        }
        
        # Redirect application
        application redirect {
            live on;
            on_publish http://localhost:8080/api/publish_redirect;
        }
    }
}
