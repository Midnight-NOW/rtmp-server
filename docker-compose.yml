version: '3.8'

services:
  nginx-rtmp:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: rtmp-server
    restart: unless-stopped
    ports:
      - "${RTMP_PORT:-1935}:1935/tcp"
      - "${HTTP_PORT:-80}:80/tcp"
      - "${HTTPS_PORT:-443}:443/tcp"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/stat.xsl:/var/streaming/stat.xsl:ro
      - ./www:/var/streaming/www:ro
      - rtmp-data:/var/streaming/hls
      - dash-data:/var/streaming/dash
      - recordings:/var/streaming/recordings
      - nginx-logs:/var/log/nginx
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - MAX_CONNECTIONS=${MAX_CONNECTIONS:-1000}
      - MAX_STREAMS=${MAX_STREAMS:-50}
      - RECORD_ENABLED=${RECORD_ENABLED:-true}
    networks:
      - rtmp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/stat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Optional: FFmpeg for transcoding
  ffmpeg-transcoder:
    image: jrottenberg/ffmpeg:latest
    container_name: rtmp-transcoder
    restart: unless-stopped
    depends_on:
      - nginx-rtmp
    volumes:
      - rtmp-data:/input/hls:ro
      - transcoded-data:/output
      - ./transcoding:/config:ro
    networks:
      - rtmp-network
    profiles:
      - transcoding
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          for file in /input/hls/*.m3u8; do
            if [ -f "$$file" ]; then
              ffmpeg -i "$$file" -c:v libx264 -b:v 2500k "/output/$(basename $$file).mp4" -y
            fi
          done
          sleep 10
        done

volumes:
  rtmp-data:
    driver: local
  dash-data:
    driver: local
  transcoded-data:
    driver: local
  recordings:
    driver: local
  nginx-logs:
    driver: local

networks:
  rtmp-network:
    driver: bridge
